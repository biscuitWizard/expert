services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: expert_training
      POSTGRES_USER: expert
      POSTGRES_PASSWORD: expert_dev
    volumes:
      - pg-data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  # --- Expert services (build from workspace) ---

  orchestrator:
    build:
      context: .
      args:
        SERVICE: orchestrator
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6334
      OLLAMA_URL: http://ollama:11434
      OLLAMA_EMBEDDINGS_URL: http://ollama:11434
      LLM_MODEL: qwen3:32b
      EMBEDDINGS_MODEL: qwen3-embedding:8b
      DATABASE_URL: postgres://expert:expert_dev@postgres:5432/expert_training
    depends_on:
      - redis

  encoder:
    build:
      context: .
      args:
        SERVICE: encoder
    environment:
      REDIS_URL: redis://redis:6379
      OLLAMA_EMBEDDINGS_URL: http://ollama:11434
      EMBEDDINGS_MODEL: qwen3-embedding:8b
      STREAM_ID: discord
    depends_on:
      - redis
      - ollama

  ssm-worker:
    build:
      context: .
      args:
        SERVICE: ssm-worker
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - orchestrator

  context-builder:
    build:
      context: .
      args:
        SERVICE: context-builder
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - rag-service

  llm-gateway:
    build:
      context: .
      args:
        SERVICE: llm-gateway
    environment:
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      LLM_MODEL: qwen3:32b
    depends_on:
      - redis
      - ollama

  rag-service:
    build:
      context: .
      args:
        SERVICE: rag-service
    environment:
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6334
    depends_on:
      - redis
      - qdrant

  training-service:
    build:
      context: .
      args:
        SERVICE: training-service
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://expert:expert_dev@postgres:5432/expert_training
    depends_on:
      - redis
      - postgres

  # stream-ingestion is interactive (reads stdin), run manually:
  # docker compose run --rm stream-ingestion

  discord-adapter:
    build:
      context: .
      args:
        SERVICE: discord-adapter
    environment:
      REDIS_URL: redis://redis:6379
      ORCHESTRATOR_URL: http://orchestrator:3000
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_EMAIL: ${DISCORD_EMAIL:-}
      DISCORD_PASSWORD: ${DISCORD_PASSWORD:-}
      DISCORD_USERNAME: ${DISCORD_USERNAME}
      DISCORD_GUILD_IDS: ${DISCORD_GUILD_IDS:-}
      STREAM_ID: discord
    depends_on:
      - redis
      - orchestrator

volumes:
  redis-data:
  pg-data:
  qdrant-data:
  ollama-data:
